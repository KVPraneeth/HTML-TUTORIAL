<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cascade</title>
    <style>
      h1 {
        color: red;
      }
      h1 {
        color: blue;
      }
      h1 {
        color: green;
      }
    </style>
  </head>
  <body>
    <!--- Cascade -->
    <h1>Cascade</h1>
    <p>We can observe that the first 2 colors are overridden by the last one</p>
    <h1 style="color: purple">Using Inline to cascade</h1>
    <p>
      We can observe that the inline style overrides the styles defined in the
      style tag
    </p>
  </body>
</html>
