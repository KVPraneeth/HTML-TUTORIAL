<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Overflow</title>
    <style>
      body {
        font-size: 20px;
      }
      .div1 {
        height: 70px;
        font-size: 40px;
        border: 8px solid black;
        width: 70px;
      }
      .div2 {
        font-size: 40px;
        border: 8px solid black;
        width: 70px;
        overflow: hidden;
      }

      .div3 {
        font-size: 40px;
        border: 8px solid black;
        width: 70px;
        overflow: scroll;
      }
      .div4 {
        font-size: 40px;
        border: 8px solid black;
        width: 70px;
        overflow: auto;
      }
    </style>
  </head>
  <body>
    <h1>Overflow</h1>

    <div class="div1">Overflow</div>
    <div class="div2">Overflow</div>
    <div class="div3">Overflow</div>
    <div class="div4">Overflow</div>

    <!-- Styling our images-->
  </body>
</html>
