<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Box Sizing</title>

    <style>
      div {
        width: 160px;
        height: 80px;
        padding: 20px;
        border: 8px solid red;
        background: yellow;
      }

      .content-box {
        /*Total width = 160px + 2*20px + 2*8px = 216px*/
        /*Total height = 80px + 2*20px + 2*8px = 136px*/
        /*content box width: 160.....height:80*/
        box-sizing: content-box;
      }

      .border-box {
        /*Total width = 160px (including padding and border)*/
        /*Total height = 80px (including padding and border)*/
        /*content box width: 160px - 2*20px - 2*8px = 104px.....height:80px - 2*20px - 2*8px = 24px*/
        box-sizing: border-box;
      }
    </style>
  </head>
  <body>
    <h1>Box Sizing</h1>

    <div class="content-box">Content Box</div>
    <br />

    <div class="border-box">Border Box</div>
  </body>
</html>
